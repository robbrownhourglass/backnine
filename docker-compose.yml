services:
  web:
    build: .
    restart: unless-stopped
    command: gunicorn --bind 0.0.0.0:5080 --workers 2 --threads 4 --timeout 120 app:app
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
      - ./secrets:/app/secrets:ro

  scraper:
    build: .
    restart: unless-stopped
    command: python manage.py scrape-all
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
      - ./secrets:/app/secrets:ro

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
